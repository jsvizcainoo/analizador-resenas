services:
  - type: web
    name: analizador-resenas
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_PUBLIC_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: BASE_URL
        sync: false         # Ej: https://analizador-resenas.onrender.com
      - key: NODE_ENV
        value: production
