<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear cuenta · Analizador de Reseñas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .logo { font-size: 1.6rem; font-weight: 700; color: #f8fafc; margin-bottom: 8px; }
    .logo span { color: #6366f1; }
    .subtitulo { color: #64748b; font-size: 0.9rem; margin-bottom: 32px; }
    .card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    h2 { font-size: 1.2rem; font-weight: 600; margin-bottom: 6px; color: #f1f5f9; }
    .precio-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #1a1f35;
      border: 1px solid #3730a3;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.82rem;
      color: #a5b4fc;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 0.95rem;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 18px;
    }
    input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
    button {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 4px;
    }
    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .error {
      background: #1a0f0f;
      border: 1px solid #7f1d1d;
      border-left: 4px solid #ef4444;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.88rem;
      color: #fca5a5;
      margin-bottom: 16px;
      display: none;
    }
    .pago-note {
      text-align: center;
      margin-top: 14px;
      font-size: 0.78rem;
      color: #475569;
    }
    .footer-link {
      text-align: center;
      margin-top: 18px;
      font-size: 0.88rem;
      color: #64748b;
    }
    .footer-link a { color: #818cf8; text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="logo">Analizador de <span>Reseñas</span></div>
<p class="subtitulo">Análisis de Google Reviews con IA</p>

<div class="card">
  <h2>Crear cuenta</h2>
  <span class="precio-badge">💳 $39.000 COP / mes · Cancela cuando quieras</span>

  <div id="errorBox" class="error"></div>

  <form id="registroForm" onsubmit="registro(event)">
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="tu@email.com" required autocomplete="email" />

    <label for="password">Contraseña</label>
    <input type="password" id="password" placeholder="Mínimo 6 caracteres" required autocomplete="new-password" />

    <button type="submit" id="btn">Crear cuenta y pagar →</button>
  </form>

  <p class="pago-note">🔒 Pago seguro procesado por MercadoPago</p>
  <p class="footer-link">¿Ya tienes cuenta? <a href="/login.html">Inicia sesión</a></p>
</div>

<script>
  async function registro(e) {
    e.preventDefault();
    const btn      = document.getElementById('btn');
    const errorBox = document.getElementById('errorBox');
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (password.length < 6) {
      errorBox.textContent = 'La contraseña debe tener al menos 6 caracteres.';
      errorBox.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Creando cuenta…';
    errorBox.style.display = 'none';

    try {
      const res  = await fetch('/api/auth/registro', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email, password }),
      });
      const data = await res.json();

      if (!res.ok) {
        errorBox.textContent = data.error;
        errorBox.style.display = 'block';
        return;
      }

      btn.textContent = 'Redirigiendo a MercadoPago…';
      window.location.href = data.checkoutUrl;
    } catch {
      errorBox.textContent = 'Error de conexión. Intenta de nuevo.';
      errorBox.style.display = 'block';
    } finally {
      if (btn.textContent !== 'Redirigiendo a MercadoPago…') {
        btn.disabled = false;
        btn.textContent = 'Crear cuenta y pagar →';
      }
    }
  }
</script>
</body>
</html>
